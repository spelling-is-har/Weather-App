<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather</title>
  <script defer src="main.js"></script></head>
  <body>
    <div class="header-container">
      <div class="title-container">
        <h1 id="title">Weather</h1>
      </div>
      <div class="input-container">
        <form action="#" id="location-form">
          <label for="location">Location</label>
          <input type="text" name="location" id="location" required />
          <button type="submit" id="Search-button">Search</button>
        </form>
      </div>
      <div class="degree-container">
        <span>°F</span>
        <label class="switch">
          <input type="checkbox" id="degree-toggle" name="degree-toggle" />
          <span class="slider round"></span>
        </label>
        <span>°C</span>
      </div>
    </div>

    <div class="location-display">Location Name Here</div>
    <div class="current-container">
      <div class="current-icon"></div>
      <div class="current temp"></div>
      <p id="current-description"></p>
    </div>
    <div class="week-container"></div>
    <div class="hours-container"></div>
  </body>
</html>
